<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧧 今日运势分析器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; font-size: 28px; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; }
        input, select {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 16px; transition: border-color 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        .optional { color: #999; font-size: 12px; font-weight: normal; }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; border: none; border-radius: 10px;
            font-size: 18px; font-weight: 600; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .result {
            margin-top: 30px; padding: 20px;
            background: #f8f9ff; border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧧 今日运势分析器</h1>
        <p class="subtitle">星座 × 传统命理 · 每日运势早知道</p>

        <form id="fortuneForm">
            <div class="form-group">
                <label>📅 出生年月日 <span style="color:red">*</span></label>
                <input type="date" id="birthday" required>
            </div>
            <div class="form-group">
                <label>⏰ 出生时间 <span class="optional">（选填，推荐填写以获得更精准的分析）</span></label>
                <input type="time" id="birthtime">
            </div>
            <button type="submit" class="btn">🔮 查看今日运势</button>
        </form>

        <div class="result" id="result">
            <h3>📊 今日运势报告</h3>
            <div id="report"></div>
        </div>
    </div>

    <script>
        document.getElementById('fortuneForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const birthday = document.getElementById('birthday').value;
            const birthtime = document.getElementById('birthtime').value;

            // TODO: 完整运势分析逻辑
            const resultDiv = document.getElementById('result');
            const reportDiv = document.getElementById('report');
            reportDiv.innerHTML = '<p>🏗️ 分析引擎开发中... 请输入你的出生信息，精彩即将呈现！</p>';
            resultDiv.classList.add('show');
        });
    </script>
</body>
</html>
