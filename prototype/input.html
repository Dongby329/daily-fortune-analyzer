<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日运势分析器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; overflow-x: hidden; }

        /* 星空滚动背景 */
        .stars-container {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            color: #1a1a1a;
            user-select: none;
            animation: drift linear infinite;
        }
        @keyframes drift {
            0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* 输入框样式 */
        .input-field {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: #fff;
            transition: border-color 0.3s;
        }
        .input-field:focus {
            outline: none;
            border-color: #444;
        }
        .btn-submit {
            background: #fff;
            color: #000;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            background: #e5e5e5;
            transform: translateY(-1px);
        }
        .btn-ghost {
            border: 1px solid #1a1a1a;
            color: #999;
            transition: all 0.3s;
        }
        .btn-ghost:hover {
            border-color: #444;
            color: #fff;
        }
        input[type="date"], input[type="time"] {
            color-scheme: dark;
        }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 滚动星座表情背景 -->
    <div class="stars-container" id="stars"></div>

    <div class="relative z-10 w-full max-w-md">

        <!-- 桌面端：居中卡片 -->
        <div class="text-center mb-8">
            <p class="text-neutral-600 text-xs tracking-widest uppercase">Daily Fortune</p>
        </div>

        <form id="fortuneForm" onsubmit="goToResult(event)">
            <!-- 出生日期 -->
            <div class="mb-6">
                <label class="block text-xs text-neutral-500 mb-3 tracking-wider">
                    出生年月日 <span class="text-neutral-700">*</span>
                </label>
                <input type="date" id="birthday" required
                    class="input-field w-full px-4 py-3 rounded-lg text-base">
            </div>

            <!-- 出生时间 -->
            <div class="mb-8">
                <label class="block text-xs text-neutral-500 mb-3 tracking-wider">
                    出生时间 <span class="text-neutral-700 text-xs">选填</span>
                </label>
                <input type="time" id="birthtime"
                    class="input-field w-full px-4 py-3 rounded-lg text-base">
                <p class="text-neutral-700 text-xs mt-2">
                    填写后可解锁八字精算
                </p>
            </div>

            <!-- 提交按钮 -->
            <button type="submit" class="btn-submit w-full py-3.5 rounded-lg text-base font-semibold tracking-wider">
                查看今日运势
            </button>
        </form>

        <!-- 分隔 -->
        <div class="flex items-center gap-3 my-6">
            <div class="flex-1 border-t border-neutral-900"></div>
            <span class="text-xs text-neutral-700">或</span>
            <div class="flex-1 border-t border-neutral-900"></div>
        </div>

        <!-- 随机体验 -->
        <button id="randomBtn" class="btn-ghost w-full py-3 rounded-lg text-sm">
            随机体验
        </button>

        <p class="text-center text-neutral-800 text-xs mt-8">
            仅供娱乐参考 · 数据仅在本地计算
        </p>
    </div>

    <!-- 加载 -->
    <div id="loadingModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="text-4xl mb-4 animate-bounce">🔮</div>
            <p class="text-white text-sm font-semibold tracking-wider">正在推演</p>
            <p class="text-neutral-500 text-xs mt-1">星座运势分析中</p>
        </div>
    </div>

    <script>
        // --- 星空滚动背景生成 ---
        const emojis = ['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓','✨','⭐','🌟','💫','☀️','🌙','🪐','🔮','☄️','🌌','✧','◈','◇'];
        const container = document.getElementById('stars');
        for (let i = 0; i < 40; i++) {
            const el = document.createElement('span');
            el.className = 'star';
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = (12 + Math.random() * 28) + 'px';
            el.style.animationDuration = (15 + Math.random() * 30) + 's';
            el.style.animationDelay = Math.random() * 20 + 's';
            container.appendChild(el);
        }

        // --- 表单 ---
        function goToResult(event) {
            event.preventDefault();
            const birthday = document.getElementById('birthday').value;
            if (!birthday) return;
            const birthtime = document.getElementById('birthtime').value;
            document.getElementById('loadingModal').classList.remove('hidden');
            setTimeout(() => {
                const params = new URLSearchParams({ birthday, birthtime });
                window.location.href = 'result.html?' + params.toString();
            }, 1500);
        }

        document.getElementById('randomBtn').addEventListener('click', () => {
            const year = 1980 + Math.floor(Math.random() * 25);
            const month = String(1 + Math.floor(Math.random() * 12)).padStart(2, '0');
            const day = String(1 + Math.floor(Math.random() * 28)).padStart(2, '0');
            document.getElementById('birthday').value = `${year}-${month}-${day}`;
            document.getElementById('birthtime').value = `${String(6 + Math.floor(Math.random() * 16)).padStart(2, '0')}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}`;
            const btn = document.getElementById('randomBtn');
            const orig = btn.textContent;
            btn.textContent = '已生成';
            btn.style.borderColor = '#444'; btn.style.color = '#fff';
            setTimeout(() => { btn.textContent = orig; btn.style.borderColor = '#1a1a1a'; btn.style.color = '#999'; }, 1500);
        });

        document.getElementById('birthday').value = '1995-06-20';
    </script>
</body>
</html>
