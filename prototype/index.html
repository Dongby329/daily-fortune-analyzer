<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧧 今日运势分析器 · 原型入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-md mx-auto p-6">
        <div class="text-center mt-12 mb-8">
            <h1 class="text-3xl">🧧</h1>
            <h1 class="text-2xl font-bold text-gray-800 mt-2">今日运势分析器</h1>
            <p class="text-gray-500 mt-1 text-sm">📐 交互原型 - 非正式产品</p>
        </div>

        <div class="space-y-3">
            <a href="input.html" class="block p-5 bg-white rounded-xl shadow-sm hover:shadow-md transition border border-gray-100">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">📅</span>
                    <div>
                        <h3 class="font-bold text-gray-800">页面 1 — 信息输入页</h3>
                        <p class="text-sm text-gray-500">填写出生日期和时间，进入运势分析</p>
                    </div>
                    <span class="ml-auto text-gray-300">→</span>
                </div>
            </a>

            <a href="result.html" class="block p-5 bg-white rounded-xl shadow-sm hover:shadow-md transition border border-gray-100">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">📊</span>
                    <div>
                        <h3 class="font-bold text-gray-800">页面 2 — 运势报告页</h3>
                        <p class="text-sm text-gray-500">综合评分、分类运势、性格解析、人际契合</p>
                    </div>
                    <span class="ml-auto text-gray-300">→</span>
                </div>
            </a>
        </div>

        <div class="mt-8 p-4 bg-white rounded-xl border border-gray-100">
            <h3 class="font-bold text-sm text-gray-600 mb-2">🔄 交互流程</h3>
            <div class="flex items-center gap-2 text-xs text-gray-500">
                <span class="bg-purple-100 text-purple-700 px-2 py-1 rounded">输入页</span>
                <span>→ 填写表单 →</span>
                <span>→ 点击按钮 →</span>
                <span class="bg-purple-100 text-purple-700 px-2 py-1 rounded">报告页</span>
                <span>→ 浏览详情 →</span>
                <span>→ 分享 / 返回修改</span>
            </div>
        </div>
    </div>
</body>
</html>
