<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧧 今日运势分析器 · 原型入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-md md:max-w-2xl mx-auto p-6 md:p-10">
        <div class="text-center mt-8 md:mt-16 mb-8 md:mb-10">
            <h1 class="text-4xl md:text-5xl">🧧</h1>
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mt-3">今日运势分析器</h1>
            <p class="text-gray-500 mt-1 text-sm md:text-base">📐 交互原型 - 非正式产品</p>
        </div>

        <!-- 页面入口（桌面端横向排列） -->
        <div class="grid md:grid-cols-2 gap-3 md:gap-4">

            <a href="input.html" class="block p-5 md:p-6 bg-white rounded-xl shadow-sm hover:shadow-md transition border border-gray-100 group">
                <div class="flex md:flex-col md:text-center items-center md:items-center gap-3 md:gap-4">
                    <span class="text-3xl md:text-5xl shrink-0">📅</span>
                    <div>
                        <h3 class="font-bold text-gray-800 text-base md:text-lg group-hover:text-purple-600 transition">信息输入页</h3>
                        <p class="text-xs md:text-sm text-gray-500 mt-1">填写出生日期和时间<br>进入运势分析</p>
                    </div>
                    <span class="ml-auto md:hidden text-gray-300 group-hover:text-purple-400 transition">→</span>
                </div>
                <div class="hidden md:block mt-4 pt-4 border-t border-gray-50">
                    <span class="text-purple-500 text-sm group-hover:underline">打开页面 →</span>
                </div>
            </a>

            <a href="result.html" class="block p-5 md:p-6 bg-white rounded-xl shadow-sm hover:shadow-md transition border border-gray-100 group">
                <div class="flex md:flex-col md:text-center items-center md:items-center gap-3 md:gap-4">
                    <span class="text-3xl md:text-5xl shrink-0">📊</span>
                    <div>
                        <h3 class="font-bold text-gray-800 text-base md:text-lg group-hover:text-purple-600 transition">运势报告页</h3>
                        <p class="text-xs md:text-sm text-gray-500 mt-1">综合评分 · 分类运势<br>性格解析 · 人际契合</p>
                    </div>
                    <span class="ml-auto md:hidden text-gray-300 group-hover:text-purple-400 transition">→</span>
                </div>
                <div class="hidden md:block mt-4 pt-4 border-t border-gray-50">
                    <span class="text-purple-500 text-sm group-hover:underline">打开页面 →</span>
                </div>
            </a>

        </div>

        <!-- 交互流程 -->
        <div class="mt-8 p-4 md:p-5 bg-white rounded-xl border border-gray-100">
            <h3 class="font-bold text-sm md:text-base text-gray-600 mb-3">🔄 交互流程</h3>
            <div class="flex flex-wrap items-center gap-2 text-xs md:text-sm text-gray-500">
                <span class="bg-purple-100 text-purple-700 px-2 py-1 rounded font-medium">输入页</span>
                <span class="hidden sm:inline">→</span>
                <span class="sm:hidden">↓</span>
                <span>填写表单</span>
                <span class="hidden sm:inline">→</span>
                <span class="sm:hidden">↓</span>
                <span>点击按钮</span>
                <span class="hidden sm:inline">→</span>
                <span class="sm:hidden">↓</span>
                <span class="bg-purple-100 text-purple-700 px-2 py-1 rounded font-medium">报告页</span>
                <span class="hidden sm:inline">→</span>
                <span class="sm:hidden">↓</span>
                <span>浏览详情</span>
                <span class="hidden sm:inline">→</span>
                <span class="sm:hidden">↓</span>
                <span>分享 / 返回修改</span>
            </div>
        </div>

        <!-- 响应式说明 -->
        <div class="mt-4 p-4 bg-white rounded-xl border border-gray-100">
            <h3 class="font-bold text-sm text-gray-600 mb-2">📱💻 响应式支持</h3>
            <p class="text-xs text-gray-400">
                适配移动端（< 768px）和桌面端（≥ 768px）<br>
                在浏览器中打开后，可拖动窗口宽度查看布局变化
            </p>
        </div>
    </div>
</body>
</html>
